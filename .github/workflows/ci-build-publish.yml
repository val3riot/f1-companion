name: CI build and publish

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  REGISTRY: ghcr.io

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - run: python -m pip install -e "./backend[dev]"
      - run: PYTHON_BIN=python scripts/ci/test-backend.sh

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.14"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: scripts/ci/test-frontend.sh

  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: scripts/ci/validate-compose.sh

  images:
    needs:
      - backend
      - frontend
      - compose
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      api_image: ${{ steps.meta.outputs.api_image }}
      frontend_image: ${{ steps.meta.outputs.frontend_image }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_namespace: ${{ steps.meta.outputs.image_namespace }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Calcola coordinate immagini
        id: meta
        env:
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          image_namespace="${REPOSITORY_OWNER,,}"
          echo "image_namespace=$image_namespace" >> "$GITHUB_OUTPUT"
          echo "api_image=$REGISTRY/$image_namespace/f1-companion-api" >> "$GITHUB_OUTPUT"
          echo "frontend_image=$REGISTRY/$image_namespace/f1-companion-frontend" >> "$GITHUB_OUTPUT"
          echo "image_tag=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
      - name: Login GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build immagini
        env:
          API_IMAGE: ${{ steps.meta.outputs.api_image }}
          BUILDX_CACHE_FROM: type=gha
          BUILDX_CACHE_TO: type=gha,mode=max
          FRONTEND_IMAGE: ${{ steps.meta.outputs.frontend_image }}
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
          PUSH_IMAGES: ${{ github.event_name == 'push' }}
        run: scripts/ci/build-images.sh

  notify-deploy-repository:
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      vars.ENABLE_DEPLOY_DISPATCH == 'true'
    needs: images
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Notifica repository privato
        env:
          API_IMAGE: ${{ needs.images.outputs.api_image }}
          DEPLOY_REPO: ${{ vars.DEPLOY_REPOSITORY }}
          DEPLOY_REPO_TOKEN: ${{ secrets.DEPLOY_REPO_TOKEN }}
          FRONTEND_IMAGE: ${{ needs.images.outputs.frontend_image }}
          IMAGE_TAG: ${{ needs.images.outputs.image_tag }}
          SOURCE_REPOSITORY: ${{ github.repository }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          test -n "$DEPLOY_REPO"
          test -n "$DEPLOY_REPO_TOKEN"
          jq -n \
            --arg source_repository "$SOURCE_REPOSITORY" \
            --arg source_sha "$SOURCE_SHA" \
            --arg image_tag "$IMAGE_TAG" \
            --arg api_image "$API_IMAGE" \
            --arg frontend_image "$FRONTEND_IMAGE" \
            '{
              event_type: "deploy-f1-companion",
              client_payload: {
                source_repository: $source_repository,
                source_sha: $source_sha,
                image_tag: $image_tag,
                api_image: $api_image,
                frontend_image: $frontend_image
              }
            }' |
            curl --fail-with-body --silent --show-error \
              --request POST \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer $DEPLOY_REPO_TOKEN" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              --data-binary @- \
              "https://api.github.com/repos/$DEPLOY_REPO/dispatches"
