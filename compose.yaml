name: f1-companion

services:
  api:
    build:
      context: ./backend
    environment:
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-60}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      ENABLE_OPENF1_HISTORY: ${ENABLE_OPENF1_HISTORY:-false}
      F1_SIGNALR_ARCHIVE_DIR: /app/.cache/f1signal
      F1_SIGNALR_ARCHIVE_ENABLED: ${F1_SIGNALR_ARCHIVE_ENABLED:-true}
      F1_SIGNALR_AUTH_TOKEN: ${F1_SIGNALR_AUTH_TOKEN:-}
      F1_SIGNALR_LOGIN_SESSION: ${F1_SIGNALR_LOGIN_SESSION:-}
      FASTF1_CACHE_DIR: /app/.cache/fastf1
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      PREDICTION_UPGRADES_FILE: /app/.cache/predictions/team_upgrades.json
      TEAM_RADIO_AUTO_TRANSCRIPTION_ENABLED: ${TEAM_RADIO_AUTO_TRANSCRIPTION_ENABLED:-false}
      TEAM_RADIO_AUTO_TRANSLATE_ENABLED: ${TEAM_RADIO_AUTO_TRANSLATE_ENABLED:-false}
      TEAM_RADIO_LOCAL_WHISPER_COMPUTE_TYPE: ${TEAM_RADIO_LOCAL_WHISPER_COMPUTE_TYPE:-float32}
      TEAM_RADIO_LOCAL_WHISPER_DEVICE: ${TEAM_RADIO_LOCAL_WHISPER_DEVICE:-auto}
      TEAM_RADIO_LOCAL_WHISPER_MODEL: ${TEAM_RADIO_LOCAL_WHISPER_MODEL:-base}
      TEAM_RADIO_TRANSCRIPTION_PROVIDER: ${TEAM_RADIO_TRANSCRIPTION_PROVIDER:-local}
      TEAM_RADIO_TRANSLATION_PROVIDER: ${TEAM_RADIO_TRANSLATION_PROVIDER:-googletrans}
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    volumes:
      - backend-cache:/app/.cache
    networks:
      - app

  frontend:
    build:
      context: ./frontend
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${FRONTEND_BIND_ADDRESS:-127.0.0.1}:${FRONTEND_PORT:-5173}:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3
    networks:
      - app

networks:
  app:
    driver: bridge

volumes:
  backend-cache:
